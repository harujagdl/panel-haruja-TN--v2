<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Ticket Haruja</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f3f3;
      margin: 0;
      padding: 24px;
      color: #111;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-bottom: 18px;
      max-width: 960px;
      margin-left: auto;
      margin-right: auto;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-back {
      background: #eee;
      color: #111;
    }

    .btn-print {
      background: #000;
      color: #fff;
    }

    .card {
      max-width: 960px;
      margin: 0 auto;
      background: #fff;
      border-radius: 18px;
      padding: 28px 32px;
      box-shadow: 0 1px 8px rgba(0,0,0,.08);
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 10px;
    }

    .logo {
      max-width: 280px;
      width: 100%;
      height: auto;
      display: inline-block;
    }

    .top-line {
      border: 0;
      border-top: 6px solid #000;
      margin: 8px 0 20px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 14px;
    }

    .title {
      font-size: 18px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .2px;
    }

    .folio {
      font-size: 18px;
      font-weight: 800;
    }

    .meta {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 6px 10px;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .meta b,
    .final-info b {
      font-weight: 800;
    }

    .section-title {
      font-size: 15px;
      font-weight: 800;
      text-transform: uppercase;
      margin: 14px 0 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      text-align: left;
      font-size: 12px;
      text-transform: uppercase;
      border-top: 1px solid #ddd;
      border-bottom: 1px solid #ddd;
      padding: 8px 6px;
    }

    tbody td {
      font-size: 13px;
      padding: 8px 6px;
      border-bottom: 1px solid #eee;
      vertical-align: top;
    }

    .ta-center { text-align: center; }
    .ta-right { text-align: right; }

    .totals {
      width: 290px;
      margin-left: auto;
      margin-top: 10px;
    }

    .totals-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 5px 0;
      font-size: 14px;
    }

    .totals-row strong {
      font-weight: 800;
    }

    .totals-grand {
      border-top: 1px solid #ddd;
      padding-top: 10px;
      margin-top: 8px;
      font-size: 18px;
      font-weight: 800;
    }

    .legal {
      margin-top: 18px;
      font-size: 12px;
      line-height: 1.4;
    }

    .legal h4 {
      margin: 12px 0 6px;
      font-size: 13px;
    }

    .legal p {
      margin: 4px 0;
    }

    .bottom {
      display: grid;
      grid-template-columns: 1fr 160px;
      gap: 16px;
      margin-top: 18px;
      align-items: end;
    }

    .final-info {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 6px 10px;
      font-size: 14px;
    }

    .qr-box {
      text-align: center;
    }

    #qr {
      display: block;
      margin: 0 auto 6px;
    }

    .qr-caption {
      font-size: 11px;
    }

    .empty,
    .error {
      max-width: 960px;
      margin: 0 auto;
      background: #fff;
      border-radius: 18px;
      padding: 28px 32px;
      text-align: center;
      box-shadow: 0 1px 8px rgba(0,0,0,.08);
      font-size: 16px;
    }

    @media print {
      body {
        background: #fff;
        padding: 0;
      }

      .actions {
        display: none;
      }

      .card,
      .empty,
      .error {
        box-shadow: none;
        border-radius: 0;
        max-width: none;
        padding: 18px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="actions">
    <button class="btn btn-back" onclick="history.back()">Volver</button>
    <button class="btn btn-print" onclick="window.print()">Imprimir / Guardar PDF</button>
  </div>

  <div id="app"></div>

  <script>
    function getFolioFromPath() {
      const parts = window.location.pathname.split('/').filter(Boolean);
      if (parts[0] === 'ticket' && parts[1]) {
        return decodeURIComponent(parts[1]).trim();
      }
      return '';
    }

    function money(value) {
      const n = Number(value || 0);
      return '$' + n.toLocaleString('es-MX', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function esc(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderError(message) {
      document.getElementById('app').innerHTML =
        `<div class="error">${esc(message)}</div>`;
    }

    function renderEmpty(message) {
      document.getElementById('app').innerHTML =
        `<div class="empty">${esc(message)}</div>`;
    }

    async function loadTicket() {
      const folio = getFolioFromPath();

      if (!folio) {
        renderError('Falta el folio en la URL.');
        return;
      }

      try {
        const res = await fetch(`/api/apartados/${encodeURIComponent(folio)}`);
        const data = await res.json();

        if (!res.ok || !data?.ok) {
          throw new Error(data?.message || `No se encontró el folio "${folio}".`);
        }

        renderTicket(data);
      } catch (err) {
        renderError(err?.message || 'No se pudo cargar el ticket.');
      }
    }

    async function renderTicket(data) {
      const folio = data.folio || '-';
      const fecha = data.fecha || '-';
      const cliente = data.cliente || '-';
      const contacto = data.contacto || '-';
      const items = Array.isArray(data.items) ? data.items : [];
      const subtotal = Number(data.subtotal || 0);
      const anticipo = Number(data.anticipo || 0);
      const descuento = Number(data.descuento || 0);
      const total = Number(data.total || 0);

      const rows = items.length
        ? items.map(item => `
          <tr>
            <td>${esc(item.codigo || '-')}</td>
            <td>${esc(item.descripcion || '-')}</td>
            <td class="ta-center">${esc(item.cantidad ?? 1)}</td>
            <td class="ta-right">${money(item.precio || 0)}</td>
            <td class="ta-right">${money(item.subtotal || 0)}</td>
          </tr>
        `).join('')
        : `
          <tr>
            <td colspan="5" class="ta-center">No hay productos en este apartado.</td>
          </tr>
        `;

      document.getElementById('app').innerHTML = `
        <div class="card">
          <div class="logo-wrap">
            <img class="logo" src="/assets/haruja-logo.png" alt="HarujaGdl">
          </div>

          <hr class="top-line">

          <div class="top-row">
            <div class="title">Ticket de apartado</div>
            <div class="folio">#${esc(folio)}</div>
          </div>

          <div class="meta">
            <b>Fecha:</b><div>${esc(fecha)}</div>
            <b>Cliente:</b><div>${esc(cliente)}</div>
            <b>Contacto:</b><div>${esc(contacto)}</div>
          </div>

          <div class="section-title">Detalle</div>

          <table>
            <thead>
              <tr>
                <th>Código</th>
                <th>Descripción</th>
                <th class="ta-center">Cant</th>
                <th class="ta-right">P.U.</th>
                <th class="ta-right">Importe</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>

          <div class="totals">
            <div class="totals-row"><strong>Subtotal:</strong><span>${money(subtotal)}</span></div>
            <div class="totals-row"><strong>Anticipo:</strong><span>${money(anticipo)}</span></div>
            <div class="totals-row"><strong>Descuento:</strong><span>${money(descuento)}</span></div>
            <div class="totals-row totals-grand"><strong>TOTAL</strong><span>${money(total)}</span></div>
          </div>

          <div class="legal">
            <p><strong>Gracias por tu compra en HarujaGdl</strong></p>

            <h4>CAMBIOS</h4>
            <p>Solicítalo dentro de 7 días naturales de recibir tu compra.</p>
            <p>La prenda debe estar nueva, sin uso, sin lavar y con etiquetas originales.</p>
            <p>No aplican cambios en: prendas tejidas, bordadas, con aplicaciones, accesorios, prendas de ropa íntima, trajes de baño, rebajas o compras con cupón.</p>
            <p>Los gastos de envío corren por cuenta del cliente.</p>
            <p>Solicita tu cambio por WhatsApp al 33 3033 6506 indicando motivo, prenda y talla deseada.</p>

            <h4>APARTADOS</h4>
            <p>Puedes apartar con 25% de anticipo.</p>
            <p>Plazo máximo para recoger: 30 días.</p>
            <p>Pasado ese tiempo, la prenda vuelve a venta y el anticipo queda como saldo a favor por 3 meses a partir de la fecha inicial del apartado.</p>
            <p>No aplican cambios ni devoluciones en apartados.</p>
            <p>No realizamos devoluciones de dinero. Todos los cambios son por producto de igual o mayor valor.</p>
          </div>

          <div class="bottom">
            <div class="final-info">
              <b>Pedido:</b><div>${esc(folio)}</div>
              <b>Fecha:</b><div>${esc(fecha)}</div>
              <b>Cliente:</b><div>${esc(cliente)}</div>
              <b>Contacto:</b><div>${esc(contacto)}</div>
            </div>

            <div class="qr-box">
              <canvas id="qr"></canvas>
              <div class="qr-caption">Escanea para ver tu apartado</div>
            </div>
          </div>
        </div>
      `;

      const qrTarget = `${window.location.origin}/apartado/${encodeURIComponent(folio)}`;
      const canvas = document.getElementById('qr');

      if (canvas && window.QRCode) {
        await QRCode.toCanvas(canvas, qrTarget, {
          width: 120,
          margin: 1
        });
      }
    }

    loadTicket();
  </script>
</body>
</html>
