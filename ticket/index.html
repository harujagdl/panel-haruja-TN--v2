<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Ticket Haruja</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    :root {
      --olive: #a7b59e;
      --coffee: #383234;
      --ivory: #faf7f2;
      --paper: #fffdf9;
      --line-soft: rgba(56, 50, 52, 0.15);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      background: var(--ivory);
      margin: 0;
      padding: 24px;
      color: var(--coffee);
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-bottom: 18px;
      max-width: 960px;
      margin-left: auto;
      margin-right: auto;
    }

    .btn {
      border: 0;
      border-radius: 12px;
      padding: 11px 18px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
      transition: opacity .2s ease;
    }

    .btn:hover {
      opacity: .9;
    }

    .btn-back {
      background: #efe8dd;
      color: var(--coffee);
      border: 1px solid rgba(56, 50, 52, 0.15);
    }

    .btn-print {
      background: var(--coffee);
      color: var(--ivory);
    }

    .card,
    .empty,
    .error {
      max-width: 960px;
      margin: 0 auto;
      background: var(--paper);
      border-radius: 20px;
      padding: 28px 32px;
      box-shadow: 0 8px 25px rgba(56, 50, 52, 0.08);
      border: 1px solid rgba(167, 181, 158, 0.2);
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 10px;
    }

    .logo {
      max-width: 300px;
      width: 100%;
      height: auto;
      display: inline-block;
    }

    .top-line {
      border: 0;
      border-top: 4px solid var(--coffee);
      margin: 10px 0 22px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--coffee);
    }

    .folio {
      font-size: 18px;
      font-weight: 700;
      color: var(--coffee);
      background: #f1ece4;
      padding: 6px 12px;
      border-radius: 999px;
    }

    .meta,
    .final-info {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 7px 12px;
      font-size: 14px;
    }

    .meta {
      margin-bottom: 18px;
    }

    .meta b,
    .final-info b {
      font-weight: 700;
      color: var(--coffee);
    }

    .section-title {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      margin: 14px 0 10px;
      color: var(--olive);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      border-radius: 10px;
      overflow: hidden;
    }

    thead th {
      text-align: left;
      font-size: 12px;
      text-transform: uppercase;
      color: var(--coffee);
      background: var(--ivory);
      border-top: 1px solid var(--line-soft);
      border-bottom: 1px solid var(--line-soft);
      padding: 10px 8px;
      letter-spacing: .3px;
    }

    tbody td {
      font-size: 13px;
      padding: 10px 8px;
      border-bottom: 1px solid rgba(56, 50, 52, 0.09);
      vertical-align: top;
      line-height: 1.35;
    }

    .ta-center { text-align: center; }
    .ta-right { text-align: right; }

    .totals {
      width: 310px;
      margin-left: auto;
      margin-top: 14px;
      background: var(--ivory);
      border: 1px solid rgba(167, 181, 158, 0.4);
      border-radius: 12px;
      padding: 12px 14px;
    }

    .totals-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 6px 0;
      font-size: 14px;
      color: var(--coffee);
    }

    .totals-row strong {
      font-weight: 700;
    }

    .totals-grand {
      border-top: 2px solid var(--olive);
      padding-top: 10px;
      margin-top: 9px;
      font-size: 19px;
      font-weight: 800;
    }

    .legal {
      margin-top: 20px;
      font-size: 12.5px;
      line-height: 1.5;
      color: var(--coffee);
    }

    .legal h4 {
      margin: 14px 0 7px;
      font-size: 13px;
      letter-spacing: .4px;
      color: var(--olive);
      border-left: 4px solid var(--olive);
      padding-left: 8px;
    }

    .legal p {
      margin: 4px 0;
    }

    .bottom {
      display: grid;
      grid-template-columns: 1fr 176px;
      gap: 16px;
      margin-top: 20px;
      align-items: end;
    }

    .qr-box {
      text-align: center;
      background: var(--ivory);
      border: 1px solid rgba(167, 181, 158, 0.45);
      border-radius: 12px;
      padding: 10px;
    }

    #qr {
      display: block;
      margin: 0 auto 7px;
    }

    .qr-caption {
      font-size: 11px;
      color: var(--coffee);
    }

    .empty,
    .error {
      text-align: center;
      font-size: 16px;
    }

    @media print {
      body {
        background: #fff;
        padding: 0;
      }

      .actions {
        display: none;
      }

      .card,
      .empty,
      .error {
        box-shadow: none;
        border-radius: 0;
        max-width: none;
        padding: 18px 20px;
      }

      .totals,
      .qr-box {
        background: var(--ivory);
      }
    }
  </style>
</head>
<body>
  <div class="actions">
    <button class="btn btn-back" onclick="history.back()">Volver</button>
    <button class="btn btn-print" onclick="window.print()">Imprimir / Guardar PDF</button>
  </div>

  <div id="app"></div>

  <script>
    function getFolioFromPath() {
      const parts = window.location.pathname.split('/').filter(Boolean);
      if (parts[0] === 'ticket' && parts[1]) return decodeURIComponent(parts[1]).trim();
      return '';
    }

    function money(value) {
      const n = Number(value || 0);
      return '$' + n.toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function esc(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderError(message) {
      document.getElementById('app').innerHTML = `<div class="error">${esc(message)}</div>`;
    }

    function renderTicket(payload) {
      const source = payload?.apartado || payload || {};
      const folio = source.folio || payload?.folio || '-';
      const fecha = source.fecha || payload?.fecha || '-';
      const cliente = source.cliente || payload?.cliente || '-';
      const contacto = source.telefono || source.contacto || payload?.contacto || '-';
      const rawItems = source.productos || payload?.items || [];
      const items = Array.isArray(rawItems) ? rawItems : [];
      const subtotal = Number(source.subtotal ?? payload?.subtotal ?? 0);
      const anticipo = Number(source.anticipo ?? payload?.anticipo ?? 0);
      const descuento = Number(source.descuento ?? payload?.descuento ?? 0);
      const total = Number(source.total ?? payload?.total ?? 0);

      const rows = items.length
        ? items.map((item) => {
            const qty = Number(item.cantidad || 1);
            const unitPrice = Number(item.precio || 0);
            const amount = Number(item.subtotal || unitPrice * qty);
            return `
              <tr>
                <td>${esc(item.codigo || '-')}</td>
                <td>${esc(item.descripcion || '-')}</td>
                <td class="ta-center">${esc(qty)}</td>
                <td class="ta-right">${money(unitPrice)}</td>
                <td class="ta-right">${money(amount)}</td>
              </tr>
            `;
          }).join('')
        : `
            <tr>
              <td colspan="5" class="ta-center">No hay productos en este apartado.</td>
            </tr>
          `;

      document.getElementById('app').innerHTML = `
        <div class="card">
          <div class="logo-wrap">
            <img class="logo" src="/assets/haruja-logo.png" alt="HarujaGdl">
          </div>

          <hr class="top-line">

          <div class="top-row">
            <div class="title">Ticket de apartado</div>
            <div class="folio">#${esc(folio)}</div>
          </div>

          <div class="meta">
            <b>Fecha:</b><div>${esc(fecha)}</div>
            <b>Cliente:</b><div>${esc(cliente)}</div>
            <b>Contacto:</b><div>${esc(contacto)}</div>
          </div>

          <div class="section-title">Detalle</div>

          <table>
            <thead>
              <tr>
                <th>Código</th>
                <th>Descripción</th>
                <th class="ta-center">Cant</th>
                <th class="ta-right">P.U.</th>
                <th class="ta-right">Importe</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>

          <div class="totals">
            <div class="totals-row"><strong>Subtotal:</strong><span>${money(subtotal)}</span></div>
            <div class="totals-row"><strong>Anticipo:</strong><span>${money(anticipo)}</span></div>
            <div class="totals-row"><strong>Descuento:</strong><span>${money(descuento)}</span></div>
            <div class="totals-row totals-grand"><strong>TOTAL</strong><span>${money(total)}</span></div>
          </div>

          <div class="legal">
            <p><strong>Gracias por tu compra en HarujaGdl</strong></p>

            <h4>CAMBIOS</h4>
            <p>Solicítalo dentro de 7 días naturales de recibir tu compra.</p>
            <p>La prenda debe estar nueva, sin uso, sin lavar y con etiquetas originales.</p>
            <p>No aplican cambios en: prendas tejidas, bordadas, con aplicaciones, accesorios, prendas de ropa íntima, trajes de baño, rebajas o compras con cupón.</p>
            <p>Los gastos de envío corren por cuenta del cliente.</p>
            <p>Solicita tu cambio por WhatsApp al 33 3033 6506 indicando motivo, prenda y talla deseada.</p>

            <h4>APARTADOS</h4>
            <p>Puedes apartar con 25% de anticipo.</p>
            <p>Plazo máximo para recoger: 30 días.</p>
            <p>Pasado ese tiempo, la prenda vuelve a venta y el anticipo queda como saldo a favor por 3 meses a partir de la fecha inicial del apartado.</p>
            <p>No aplican cambios ni devoluciones en apartados.</p>
            <p>No realizamos devoluciones de dinero. Todos los cambios son por producto de igual o mayor valor.</p>
          </div>

          <div class="bottom">
            <div class="final-info">
              <b>Pedido:</b><div>${esc(folio)}</div>
              <b>Fecha:</b><div>${esc(fecha)}</div>
              <b>Cliente:</b><div>${esc(cliente)}</div>
              <b>Contacto:</b><div>${esc(contacto)}</div>
            </div>

            <div class="qr-box">
              <canvas id="qr"></canvas>
              <div class="qr-caption">Escanea para ver tu apartado</div>
            </div>
          </div>
        </div>
      `;

      const qrTarget = `${window.location.origin}/apartado/${encodeURIComponent(folio)}`;
      const canvas = document.getElementById('qr');

      if (canvas && window.QRCode) {
        QRCode.toCanvas(canvas, qrTarget, { width: 120, margin: 1 });
      }
    }

    async function loadTicket() {
      const folio = getFolioFromPath();
      if (!folio) return renderError('Falta el folio en la URL.');

      try {
        const res = await fetch(`/api/apartados/${encodeURIComponent(folio)}`);
        const data = await res.json();
        if (!res.ok || !data?.ok) throw new Error(data?.message || `No se encontró el folio "${folio}".`);
        renderTicket(data);
      } catch (err) {
        renderError(err?.message || 'No se pudo cargar el ticket.');
      }
    }

    loadTicket();
  </script>
</body>
</html>
