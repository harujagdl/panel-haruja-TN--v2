<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ticket Haruja</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

:root{
--olive:#a7b59e;
--coffee:#383234;
--ivory:#faf7f2;
--paper:#fffdf9;
--line-soft:rgba(56,50,52,.15);
}

*{box-sizing:border-box}

body{
font-family:"Segoe UI",Arial,sans-serif;
background:var(--ivory);
margin:0;
padding:24px;
color:var(--coffee);
-webkit-print-color-adjust:exact;
print-color-adjust:exact;
}

.actions{
display:flex;
justify-content:flex-end;
gap:12px;
margin-bottom:18px;
max-width:900px;
margin-left:auto;
margin-right:auto;
}

.btn{
border:0;
border-radius:12px;
padding:11px 18px;
font-weight:700;
cursor:pointer;
font-size:14px;
}

.btn-back{
background:#efe8dd;
color:var(--coffee);
border:1px solid rgba(56,50,52,.15);
}

.btn-print{
background:var(--coffee);
color:var(--ivory);
}

.card{
width:min(100%,820px);
margin:auto;
background:var(--paper);
border-radius:18px;
padding:28px 32px;
box-shadow:0 8px 25px rgba(0,0,0,.08);
border:1px solid rgba(167,181,158,.2);
}

.logo-wrap{
text-align:center;
margin-bottom:12px;
}

.logo{
width:240px;
max-width:100%;
height:auto;
display:block;
margin:auto;
}

.top-line{
border:0;
border-top:4px solid var(--coffee);
margin:10px 0 22px;
}

.top-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.title{
font-size:20px;
font-weight:700;
text-transform:uppercase;
}

.folio{
font-weight:700;
background:#f1ece4;
padding:6px 12px;
border-radius:999px;
}

.meta{
display:grid;
grid-template-columns:96px 1fr;
gap:6px 12px;
font-size:14px;
margin-bottom:18px;
}

.section-title{
font-size:14px;
font-weight:700;
text-transform:uppercase;
letter-spacing:.6px;
margin:14px 0 10px;
color:var(--olive);
}

table{
width:100%;
border-collapse:collapse;
}

thead th{
text-align:left;
font-size:12px;
text-transform:uppercase;
background:var(--ivory);
border-top:1px solid var(--line-soft);
border-bottom:1px solid var(--line-soft);
padding:10px 8px;
}

tbody td{
font-size:13px;
padding:10px 8px;
border-bottom:1px solid rgba(56,50,52,.09);
}

.ta-center{text-align:center}
.ta-right{text-align:right}

.totals{
width:310px;
margin-left:auto;
margin-top:14px;
background:var(--ivory);
border:1px solid rgba(167,181,158,.4);
border-radius:12px;
padding:12px 14px;
}

.totals-row{
display:flex;
justify-content:space-between;
margin:6px 0;
}

.totals-grand{
border-top:2px solid var(--olive);
padding-top:10px;
margin-top:8px;
font-size:19px;
font-weight:800;
}

.legal{
margin-top:20px;
font-size:12.5px;
line-height:1.5;
}

.legal h4{
margin:14px 0 7px;
font-size:13px;
color:var(--olive);
border-left:4px solid var(--olive);
padding-left:8px;
}

.bottom{
display:grid;
grid-template-columns:1fr 170px;
gap:16px;
margin-top:20px;
align-items:end;
}

.qr-box{
text-align:center;
background:var(--ivory);
border:1px solid rgba(167,181,158,.45);
border-radius:12px;
padding:10px;
}

#qr{
display:block;
margin:auto;
}

.qr-caption{
font-size:11px;
}

@page{
size:Letter;
margin:12mm;
}

@media print{

body{
background:#fff;
padding:0;
}

.actions{
display:none;
}

.card{
box-shadow:none;
border-radius:0;
border:0;
width:100%;
max-width:100%;
padding:14px;
}

}

</style>
</head>

<body>

<div class="actions">
<button class="btn btn-back" onclick="history.back()">Volver</button>
<button class="btn btn-print" onclick="window.print()">Imprimir / Guardar PDF</button>
</div>

<div id="app"></div>

<script>

function getFolioFromPath(){
const parts=window.location.pathname.split('/').filter(Boolean)
if(parts[0]==='ticket' && parts[1]) return decodeURIComponent(parts[1])
return''
}

function money(v){
const n=Number(v||0)
return '$'+n.toLocaleString('es-MX',{minimumFractionDigits:2})
}

function esc(v){
return String(v??'')
.replaceAll('&','&amp;')
.replaceAll('<','&lt;')
.replaceAll('>','&gt;')
}

async function loadTicket(){

const folio=getFolioFromPath()

if(!folio){
document.getElementById('app').innerHTML="Folio inválido"
return
}

const res=await fetch(`/api/apartados/${folio}`)
const data=await res.json()

renderTicket(data)

}

function renderTicket(payload){

const a=payload.apartado||payload

const items=a.productos||[]

const rows=items.length?items.map(i=>`

<tr>
<td>${esc(i.codigo)}</td>
<td>${esc(i.descripcion)}</td>
<td class="ta-center">${esc(i.cantidad||1)}</td>
<td class="ta-right">${money(i.precio)}</td>
<td class="ta-right">${money(i.subtotal)}</td>
</tr>

`).join(''):`<tr><td colspan="5" class="ta-center">No hay productos</td></tr>`

document.getElementById('app').innerHTML=`

<div class="card">

<div class="logo-wrap">
<img class="logo" src="/public/assets/haruja-logo.png" alt="HarujaGdl">
</div>

<hr class="top-line">

<div class="top-row">
<div class="title">Ticket de apartado</div>
<div class="folio">#${esc(a.folio)}</div>
</div>

<div class="meta">
<b>Fecha:</b><div>${esc(a.fecha)}</div>
<b>Cliente:</b><div>${esc(a.cliente)}</div>
<b>Contacto:</b><div>${esc(a.telefono||a.contacto)}</div>
</div>

<div class="section-title">Detalle</div>

<table>
<thead>
<tr>
<th>Código</th>
<th>Descripción</th>
<th class="ta-center">Cant</th>
<th class="ta-right">P.U.</th>
<th class="ta-right">Importe</th>
</tr>
</thead>
<tbody>${rows}</tbody>
</table>

<div class="totals">
<div class="totals-row"><b>Subtotal:</b><span>${money(a.subtotal)}</span></div>
<div class="totals-row"><b>Anticipo:</b><span>${money(a.anticipo)}</span></div>
<div class="totals-row"><b>Descuento:</b><span>${money(a.descuento)}</span></div>
<div class="totals-row totals-grand"><b>TOTAL</b><span>${money(a.total)}</span></div>
</div>

<div class="legal">

<p><strong>Gracias por tu compra en HarujaGdl</strong></p>

<h4>CAMBIOS</h4>
<p>Solicítalo dentro de 7 días naturales de recibir tu compra.</p>

<h4>APARTADOS</h4>
<p>Puedes apartar con 25% de anticipo.</p>
<p>Plazo máximo para recoger: 30 días.</p>

</div>

<div class="bottom">

<div class="meta">
<b>Pedido:</b><div>${esc(a.folio)}</div>
<b>Fecha:</b><div>${esc(a.fecha)}</div>
<b>Cliente:</b><div>${esc(a.cliente)}</div>
<b>Contacto:</b><div>${esc(a.telefono||a.contacto)}</div>
</div>

<div class="qr-box">
<canvas id="qr"></canvas>
<div class="qr-caption">Escanea para ver tu apartado</div>
</div>

</div>

</div>
`

const urlStatus=`${window.location.origin}/apartado/${a.folio}`

QRCode.toCanvas(document.getElementById('qr'),urlStatus,{width:120})

}

loadTicket()

</script>

</body>
</html>
