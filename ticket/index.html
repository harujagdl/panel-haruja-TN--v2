<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ticket Haruja</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f5f5f5;
margin:0;
padding:30px;
}

.ticket{
max-width:500px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.header{
text-align:center;
margin-bottom:20px;
}

.logo{
max-width:120px;
}

.folio{
font-size:18px;
font-weight:bold;
margin-top:10px;
}

.section{
margin-top:15px;
}

.qr{
text-align:center;
margin-top:20px;
}

.buttons{
position:fixed;
top:20px;
right:20px;
display:flex;
gap:10px;
}

button{
padding:10px 16px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.print{
background:black;
color:white;
}

.back{
background:#eee;
}

.error{
text-align:center;
padding:40px;
font-size:18px;
}

@media print{

.buttons{
display:none;
}

body{
background:white;
padding:0;
}

.ticket{
box-shadow:none;
}

}

</style>
</head>

<body>

<div class="buttons">
<button class="back" onclick="history.back()">Volver</button>
<button class="print" onclick="window.print()">Imprimir / Guardar PDF</button>
</div>

<div id="app"></div>

<script>

function getFolio(){
const parts = location.pathname.split('/').filter(Boolean)

if(parts[0]==="ticket" && parts[1]){
return decodeURIComponent(parts[1])
}

return null
}

async function loadTicket(){

const folio = getFolio()

if(!folio){
document.getElementById("app").innerHTML =
'<div class="error">Falta el folio en la URL.</div>'
return
}

try{

const res = await fetch(`/api/${folio}`)
const data = await res.json()

if(!data.ok){
throw new Error(data.message || "No encontrado")
}

renderTicket(data.ticket)

}catch(err){

document.getElementById("app").innerHTML =
`<div class="error">No se pudo cargar el ticket</div>`

}

}

function renderTicket(ticket){

const html = `

<div class="ticket">

<div class="header">
<img class="logo" src="/public/assets/haruja-logo.png">
<div class="folio">Folio: ${ticket.folio}</div>
</div>

<div class="section">
<strong>Cliente:</strong> ${ticket.cliente || "-"}
</div>

<div class="section">
<strong>Fecha:</strong> ${ticket.fecha || "-"}
</div>

<div class="section">
<strong>Total:</strong> $${ticket.total || "0"}
</div>

<div class="qr">
<canvas id="qr"></canvas>
</div>

</div>

`

document.getElementById("app").innerHTML = html

QRCode.toCanvas(
document.getElementById("qr"),
location.href,
{ width:140 }
)

}

loadTicket()

</script>

</body>
</html>
