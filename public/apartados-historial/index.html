<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Historial de Apartados - HarujaGdl</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f3f5f9;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#dbe2ee;--brand:#1d4ed8;--brandDark:#1e3a8a;--ok:#15803d}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif}
    .container{max-width:1220px;margin:28px auto;padding:0 16px}
    .header{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:14px}
    .title{font-size:30px;font-weight:800;letter-spacing:-.02em;color:#0b1f5e}
    .brand img{height:36px;width:auto}
    .top-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-bottom:14px}
    .btn{appearance:none;border-radius:12px;padding:10px 14px;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;border:1px solid transparent;display:inline-flex;align-items:center;justify-content:center;min-height:40px}
    .btn-back{background:#fff;border-color:var(--line);color:var(--brand)}
    .btn-primary{background:var(--brand);color:#fff}
    .btn-primary:hover{background:var(--brandDark)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 8px 20px rgba(15,23,42,.05)}
    .card-hd{padding:16px 18px;border-bottom:1px solid var(--line);font-size:17px;font-weight:800;color:#0b1f5e}
    .card-bd{padding:18px}
    .filters{display:grid;grid-template-columns:minmax(240px,1fr) 220px auto;gap:10px;margin-bottom:14px}
    .search,.select{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 12px;font-size:14px;background:#fff}
    .status{min-height:22px;font-size:14px;margin-bottom:10px}
    .muted{color:var(--muted)}.err{color:#b91c1c;font-weight:700}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px;background:#fff}
    table{width:100%;border-collapse:collapse;min-width:980px}
    th,td{padding:12px 10px;border-bottom:1px solid #e8edf5;font-size:13px;vertical-align:middle}
    th{background:#f8fbff;color:#1e3a8a;font-weight:800}
    tr:last-child td{border-bottom:0}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .action{border:1px solid transparent;border-radius:10px;padding:7px 10px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;white-space:nowrap;min-height:32px;display:inline-flex;align-items:center}
    .abonar{background:#e0ecff;color:#1d4ed8}.ticket{background:#dbeafe;color:#1d4ed8}.pdf{background:#eef2ff;color:#3730a3}
    .regen{background:#dcfce7;color:#166534}.copy{background:#f8fafc;color:#334155;border-color:#dbe2ee}
    .estado{font-size:11px;font-weight:800;border-radius:999px;padding:4px 8px;display:inline-block}
    .estado.activo{background:#dbeafe;color:#1d4ed8}.estado.liquidado{background:#dcfce7;color:#166534}.estado.cancelado{background:#fee2e2;color:#991b1b}
    @media (max-width:880px){.filters{grid-template-columns:1fr}.title{font-size:24px}}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">Historial de Apartados</div>
      <a class="brand" href="/#/panel" aria-label="Volver al panel"><img src="/assets/haruja-logo.png" alt="HarujaGdl" onerror="this.style.display='none'"></a>
    </div>

    <div class="top-actions">
      <a href="/#/panel" class="btn btn-back">← Volver al panel</a>
      <a href="/apartados" class="btn btn-primary">+ Registrar apartado</a>
    </div>

    <div class="card">
      <div class="card-hd">Listado de apartados</div>
      <div class="card-bd">
        <div class="filters">
          <input id="search" class="search" type="search" placeholder="Buscar por folio, cliente o teléfono...">
          <select id="estado" class="select">
            <option value="">Todos los estatus</option>
            <option value="ACTIVO">Activo</option>
            <option value="LIQUIDADO">Liquidado</option>
            <option value="CANCELADO">Cancelado</option>
          </select>
          <button id="btn-filtrar" class="btn btn-primary" type="button">Filtrar</button>
        </div>
        <div id="status" class="status muted">Cargando apartados...</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Folio</th><th>Fecha</th><th>Cliente</th><th>Contacto</th><th>Total</th><th>Anticipo</th><th>Saldo</th><th>Estatus</th><th>Acciones</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const state = { apartados: [] };
    const statusEl = document.getElementById('status');
    const rowsEl = document.getElementById('rows');
    const searchEl = document.getElementById('search');
    const estadoEl = document.getElementById('estado');
    const btnFiltrar = document.getElementById('btn-filtrar');
    let debounceTimer = null;
    let currentController = null;
    let isLoading = false;
    let retryAfterTs = 0;

    function logPdfEvent(eventName, payload = {}) {
      console.log(eventName, payload);
    }

    function formatMoney(value) {
      const amount = Number(value || 0);
      return amount.toLocaleString('es-MX', { style: 'currency', currency: 'MXN' });
    }

    function formatDate(value) {
      const raw = String(value || '').trim();
      if (!raw) return '-';
      const date = new Date(raw);
      if (Number.isNaN(date.getTime())) return raw;
      return date.toLocaleDateString('es-MX');
    }

    function estadoClass(estado) {
      const normalized = String(estado || '').toLowerCase();
      if (normalized.includes('liquid')) return 'liquidado';
      if (normalized.includes('cancel')) return 'cancelado';
      return 'activo';
    }

    function isLiquidado(item) {
      const saldoPendiente = Number(item?.saldo || 0);
      const estado = String(item?.status || item?.estatus || '').trim().toUpperCase();
      return estado === 'LIQUIDADO' || saldoPendiente <= 0;
    }

    function ticketUrlFor(item) {
      const ticketUrl = String(item.ticketUrl || '').trim();
      if (ticketUrl) return ticketUrl;
      const folio = String(item.folio || '').trim();
      return folio ? `/ticket/${encodeURIComponent(folio)}` : '';
    }

    function renderRows() {
      if (!state.apartados.length) {
        rowsEl.innerHTML = '<tr><td colspan="9" class="muted">No se encontraron apartados.</td></tr>';
        return;
      }

      rowsEl.innerHTML = state.apartados.map((item) => {
        const folio = String(item.folio || '').trim();
        const ticketUrl = ticketUrlFor(item);
        const pdfUrl = String(item.pdfDriveUrl || item.pdfUrlPersistido || item.pdfUrl || '').trim();
        const hasPdf = Boolean(pdfUrl);
        const copyTarget = hasPdf ? pdfUrl : '';
        const abonoUrl = `/apartados?abono=1&folio=${encodeURIComponent(folio)}`;
        const isApartadoLiquidado = isLiquidado(item);
        const estadoLabel = isApartadoLiquidado ? 'LIQUIDADO' : (item.status || item.estatus || 'ACTIVO');

        const ticketButton = ticketUrl
          ? `<a class="action ticket" href="${ticketUrl}" target="_blank" rel="noopener noreferrer">Ver ticket</a>`
          : '';
        const pdfButton = hasPdf
          ? `<a class="action pdf" href="${pdfUrl}" target="_blank" rel="noopener noreferrer">Abrir PDF</a>`
          : '';
        const regenButton = !hasPdf
          ? `<button class="action regen" data-folio="${folio}" onclick="regeneratePdf(this)">Generar PDF oficial</button>`
          : '';
        const copyButton = copyTarget
          ? `<button class="action copy" data-url="${copyTarget}" onclick="copyLink(this)">Copiar link PDF</button>`
          : `<button class="action copy" type="button" onclick="showGeneratePdfHint('${folio}')">Copiar link PDF</button>`;
        const abonarButton = isApartadoLiquidado
          ? ''
          : `<a class="action abonar" href="${abonoUrl}">Abonar</a>`;

        return `
          <tr>
            <td>${folio || '-'}</td>
            <td>${formatDate(item.fecha)}</td>
            <td>${item.cliente || '-'}</td>
            <td>${item.contacto || '-'}</td>
            <td>${formatMoney(item.total)}</td>
            <td>${formatMoney(item.anticipo)}</td>
            <td>${formatMoney(item.saldo)}</td>
            <td><span class="estado ${estadoClass(estadoLabel)}">${estadoLabel}</span></td>
            <td><div class="actions">${abonarButton}${ticketButton}${pdfButton}${regenButton}${copyButton}</div></td>
          </tr>
        `;
      }).join('');
    }

    async function copyLink(btn) {
      const url = String(btn?.dataset?.url || '').trim();
      if (!url) return;
      try {
        const absolute = new URL(url, window.location.origin).toString();
        await navigator.clipboard.writeText(absolute);
        statusEl.textContent = 'Link del PDF oficial copiado correctamente.';
        statusEl.className = 'status muted';
      } catch (_) {
        statusEl.textContent = 'No se pudo copiar automáticamente el link.';
        statusEl.className = 'status err';
      }
    }

    function showGeneratePdfHint(folio) {
      statusEl.textContent = `El apartado ${folio} aún no tiene PDF oficial. Genera el PDF oficial antes de compartir.`;
      statusEl.className = 'status err';
    }

    function openTicketForPdfGeneration(folio) {
      const url = `/ticket/${encodeURIComponent(folio)}?exportPdf=1&source=historial`;
      const popup = window.open(url, '_blank', 'noopener,noreferrer,width=1200,height=900');
      if (!popup) {
        throw new Error('Tu navegador bloqueó la ventana emergente. Permite popups para generar el PDF.');
      }
      return popup;
    }

    async function regeneratePdf(btn) {
      const folio = String(btn?.dataset?.folio || '').trim();
      if (!folio) return;

      const original = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Abriendo ticket...';

      try {
        openTicketForPdfGeneration(folio);
        logPdfEvent('pdf:open_ticket', { folio });
        statusEl.textContent = `Abriendo ticket para generar PDF oficial de ${folio}...`;
        statusEl.className = 'status muted';
      } catch (error) {
        logPdfEvent('pdf:open_ticket_error', { folio, message: error?.message || 'Error desconocido' });
        statusEl.textContent = error.message || 'No se pudo abrir el ticket para generar PDF.';
        statusEl.className = 'status err';
        btn.disabled = false;
        btn.textContent = original;
      }
    }

    function markPdfReady({ folio, pdfUrl, fileId, updatedAt }) {
      state.apartados = state.apartados.map((item) => String(item.folio || '').toUpperCase() === String(folio || '').toUpperCase()
        ? {
            ...item,
            pdfDriveUrl: pdfUrl,
            pdfUrl,
            pdfFileId: fileId,
            pdfUpdatedAt: updatedAt,
            hasOfficialPdf: true,
          }
        : item);

      renderRows();
      statusEl.textContent = `PDF oficial guardado correctamente en Drive para ${folio}.`;
      statusEl.className = 'status muted';
    }

    window.addEventListener('message', (event) => {
      if (event.origin !== window.location.origin) return;
      const data = event.data || {};
      if (data?.source !== 'haruja-ticket' || data?.type !== 'pdf-saved') return;

      if (data?.error) {
        logPdfEvent('pdf:message_error', data);
        statusEl.textContent = data.error;
        statusEl.className = 'status err';
        return;
      }

      if (data?.folio && data?.pdfUrl && data?.fileId) {
        logPdfEvent('pdf:message_ok', data);
        markPdfReady(data);
      }
    });

    function buildListUrl() {
      const url = new URL('/api/core', window.location.origin);
      url.searchParams.set('action', 'apartados');
      url.searchParams.set('op', 'list');
      const q = searchEl.value.trim();
      const status = String(estadoEl.value || '').trim().toUpperCase();
      if (q) url.searchParams.set('q', q);
      if (status) url.searchParams.set('status', status);
      return url.toString();
    }

    function mapQuotaError(message) {
      const raw = String(message || '');
      if (raw.toLowerCase().includes('quota exceeded')) {
        return 'El historial está temporalmente saturado. Intenta de nuevo en unos segundos.';
      }
      return raw;
    }

    function scheduleSoftRetryWindow() {
      const waitMs = 2000 + Math.floor(Math.random() * 2000);
      retryAfterTs = Date.now() + waitMs;
      return waitMs;
    }

    async function fetchList({ force = false } = {}) {
      if (isLoading) {
        return;
      }
      if (!force && retryAfterTs && Date.now() < retryAfterTs) {
        const secs = Math.max(1, Math.ceil((retryAfterTs - Date.now()) / 1000));
        statusEl.textContent = `El historial está temporalmente saturado. Espera ${secs}s y reintenta manualmente.`;
        statusEl.className = 'status err';
        return;
      }

      if (currentController) currentController.abort();
      currentController = new AbortController();
      const listUrl = buildListUrl();
      try {
        isLoading = true;
        retryAfterTs = 0;
        btnFiltrar.disabled = true;
        statusEl.textContent = 'Cargando apartados...';
        statusEl.className = 'status muted';
        const resp = await fetch(listUrl, { signal: currentController.signal });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok || !data.ok) {
          const error = new Error(data?.message || 'No se pudo cargar el historial.');
          error.status = resp.status;
          throw error;
        }

        const body = data.data || {};
        state.apartados = Array.isArray(body.apartados) ? body.apartados : [];
        renderRows();
        statusEl.textContent = `${state.apartados.length} apartado(s) mostrado(s).`;
        statusEl.className = 'status muted';
      } catch (error) {
        if (error?.name === 'AbortError') return;
        if (Number(error?.status) === 429) {
          const waitMs = scheduleSoftRetryWindow();
          const secs = Math.ceil(waitMs / 1000);
          statusEl.textContent = `Demasiadas solicitudes. Intenta nuevamente en ${secs}s con el botón "Filtrar".`;
          statusEl.className = 'status err';
          return;
        }
        statusEl.textContent = mapQuotaError(error.message || 'Error cargando historial.');
        statusEl.className = 'status err';
        rowsEl.innerHTML = '<tr><td colspan="9" class="muted">Sin datos.</td></tr>';
      } finally {
        isLoading = false;
        btnFiltrar.disabled = false;
      }
    }

    function fetchListDebounced() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => fetchList(), 350);
    }

    if (!window.__harujaApartadosHistorialInit) {
      window.__harujaApartadosHistorialInit = true;
      searchEl.addEventListener('input', fetchListDebounced);
      estadoEl.addEventListener('change', fetchList);
      btnFiltrar.addEventListener('click', fetchList);
      fetchList();
    }
  </script>
</body>
</html>
