<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Apartado PDF · Haruja</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<style>
@page { size: Letter; margin: 12mm; }
html,body{margin:0;padding:0;background:#fff}
body{font-family:"Segoe UI",Arial,sans-serif;color:#383234}
.ticket-pdf{-webkit-print-color-adjust:exact;print-color-adjust:exact;width:816px;margin:0 auto;background:#fff;padding:16px 18px;}
.logo-wrap{text-align:center;min-height:78px}
.logo{width:188px;height:auto;display:block;margin:0 auto}
.top-line{border:0;border-top:2px solid #383234;margin:10px 0 14px}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.title{font-size:18px;font-weight:700;text-transform:uppercase}
.folio{font-weight:700;background:#f1ece4;padding:5px 10px;border-radius:999px;font-size:13px}
.meta{display:grid;grid-template-columns:88px 1fr;gap:6px 12px;font-size:13px;margin-bottom:12px}
.section-title{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin:10px 0 8px;color:#a7b59e}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead th{text-align:left;font-size:12px;text-transform:uppercase;background:#f1ece4;border-top:1px solid #d8d3cc;border-bottom:1px solid #d8d3cc;padding:8px 7px}
tbody td{font-size:12.5px;padding:8px 7px;border-bottom:1px solid rgba(56,50,52,.09);vertical-align:top}
.col-code{width:23%}.col-desc{width:33%}.col-qty{width:10%}.col-unit{width:17%}.col-amount{width:17%}
.cell-desc{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ta-center{text-align:center}.ta-right{text-align:right}
.totals-box{width:320px;margin-left:auto;margin-top:12px;background:#f1ece4;border:1px solid rgba(167,181,158,.4);border-radius:10px;padding:10px 12px;break-inside:avoid;page-break-inside:avoid}
.totals-row{display:flex;justify-content:space-between;margin:6px 0;font-size:13px}.totals-grand{border-top:2px solid #a7b59e;padding-top:10px;margin-top:8px;font-size:17px;font-weight:800}
.legal-box{margin-top:14px;font-size:11px;line-height:1.3;break-inside:avoid;page-break-inside:avoid}
.legal-box h4{margin:8px 0 4px;font-size:11.8px;color:#a7b59e;border-left:4px solid #a7b59e;padding-left:8px}
.footer-box{display:flex;justify-content:flex-end;margin-top:10px;break-inside:avoid;page-break-inside:avoid}
.qr-box{text-align:center;background:#f1ece4;border:1px solid rgba(167,181,158,.45);border-radius:12px;padding:8px;width:122px}
#qr{display:block;margin:auto}.qr-caption{font-size:10px}
</style>
</head>
<body>
<div id="app"></div>
<script>
function getFolioFromPath(){const p=new URLSearchParams(window.location.search);const q=String(p.get('folio')||'').trim();if(q)return q;const parts=window.location.pathname.split('/').filter(Boolean);if(parts[0]==='apartado-pdf'&&parts[1])return decodeURIComponent(parts[1]).trim();return''}
function money(v){const n=Number(v||0);return '$'+n.toLocaleString('es-MX',{minimumFractionDigits:2})}
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}
async function loadTicket(){const folio=getFolioFromPath();if(!folio){document.getElementById('app').textContent='Folio inválido';return}const res=await fetch(`/api/core?action=apartados&op=detail&folio=${encodeURIComponent(folio)}`);const payload=await res.json();renderTicket(payload?.data||payload)}
function renderTicket(payload){const a=payload.apartado||payload;const rows=(a.productos||[]).length?(a.productos||[]).map(i=>`<tr class="table-row"><td>${esc(i.codigo)}</td><td class="cell-desc">${esc(i.descripcion)}</td><td class="ta-center">${esc(i.cantidad||1)}</td><td class="ta-right">${money(i.precio)}</td><td class="ta-right">${money(i.subtotal)}</td></tr>`).join(''):`<tr class="table-row"><td colspan="5" class="ta-center">No hay productos</td></tr>`;document.getElementById('app').innerHTML=`<section class="ticket-pdf" data-ticket-pdf-ready="true"><div class="logo-wrap"><img class="logo" src="/assets/haruja-logo.png" alt="HarujaGdl"></div><hr class="top-line"><div class="top-row"><div class="title">Ticket de apartado</div><div class="folio">#${esc(a.folio)}</div></div><div class="meta"><b>Fecha:</b><div>${esc(a.fecha)}</div><b>Cliente:</b><div>${esc(a.cliente)}</div><b>Contacto:</b><div>${esc(a.telefono||a.contacto)}</div></div><div class="section-title">Detalle</div><table><thead><tr><th class="col-code">Código</th><th class="col-desc">Descripción</th><th class="col-qty ta-center">Cant</th><th class="col-unit ta-right">P.U.</th><th class="col-amount ta-right">Importe</th></tr></thead><tbody>${rows}</tbody></table><div class="totals-box"><div class="totals-row"><b>Subtotal:</b><span>${money(a.subtotal)}</span></div><div class="totals-row"><b>Anticipo:</b><span>${money(a.anticipo)}</span></div><div class="totals-row"><b>Descuento:</b><span>${money(a.descuento)}</span></div><div class="totals-row totals-grand"><b>TOTAL</b><span>${money(a.total)}</span></div></div><div class="legal-box"><p><strong>Gracias por tu compra en HarujaGdl</strong></p><h4>CAMBIOS</h4><p>Solicítalo dentro de 7 días naturales de recibir tu compra.</p><p>La prenda debe estar nueva, sin uso, sin lavar y con etiquetas originales.</p><h4>APARTADOS</h4><p>Puedes apartar con 25% de anticipo. Plazo máximo para recoger: 30 días.</p><p>No aplican cambios ni devoluciones en apartados.</p></div><div class="footer-box"><div class="qr-box"><canvas id="qr"></canvas><div class="qr-caption">Escanea para ver tu apartado</div></div></div></section>`;const urlStatus=`${window.location.origin}/apartado/${encodeURIComponent(a.folio||'')}`;QRCode.toCanvas(document.getElementById('qr'),urlStatus,{width:96,margin:1})}
loadTicket();
</script>
</body>
</html>
