<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ticket Haruja</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
:root{
--olive:#a7b59e;
--coffee:#383234;
--ivory:#faf7f2;
--paper:#fffdfa;
--line-soft:#d8d3cc;
--sand:#f1ece4;
}

*{box-sizing:border-box}

body{
font-family:"Segoe UI",Arial,sans-serif;
background:var(--ivory);
margin:0;
padding:24px;
color:var(--coffee);
-webkit-print-color-adjust:exact;
print-color-adjust:exact;
}

.actions{
display:flex;
justify-content:flex-end;
gap:12px;
margin-bottom:14px;
max-width:216mm;
margin-left:auto;
margin-right:auto;
flex-wrap:wrap;
}

.btn{
border:0;
border-radius:12px;
padding:11px 18px;
font-weight:700;
cursor:pointer;
font-size:14px;
}

.btn:disabled{
opacity:.65;
cursor:not-allowed;
}

.btn-back{
background:#efe8dd;
color:var(--coffee);
border:1px solid rgba(56,50,52,.15);
}

.btn-print{
background:var(--coffee);
color:var(--ivory);
}

.btn-secondary{
background:#f1ece4;
color:var(--coffee);
border:1px solid rgba(56,50,52,.2);
}

.pdf-status{
max-width:216mm;
margin:0 auto 10px;
font-size:12px;
color:#5b5457;
min-height:18px;
}

.card{
width:min(100%,186mm);
margin:auto;
background:var(--paper);
border-radius:16px;
padding:20px 24px;
box-shadow:0 8px 25px rgba(0,0,0,.08);
border:1px solid rgba(167,181,158,.2);
page-break-inside:avoid;
}

.logo-wrap{
text-align:center;
margin-bottom:8px;
}

.logo{
width:200px;
max-width:100%;
height:auto;
display:block;
margin:auto;
}

.top-line{
border:0;
border-top:3px solid var(--coffee);
margin:8px 0 14px;
}

.top-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.title{
font-size:18px;
font-weight:700;
text-transform:uppercase;
}

.folio{
font-weight:700;
background:var(--sand);
padding:5px 10px;
border-radius:999px;
font-size:13px;
}

.meta{
display:grid;
grid-template-columns:88px 1fr;
gap:6px 12px;
font-size:13px;
margin-bottom:10px;
}

.section-title{
font-size:14px;
font-weight:700;
text-transform:uppercase;
letter-spacing:.6px;
margin:10px 0 8px;
color:var(--olive);
}

table{
width:100%;
border-collapse:collapse;
}

thead th{
text-align:left;
font-size:12px;
text-transform:uppercase;
background:var(--sand);
border-top:1px solid var(--line-soft);
border-bottom:1px solid var(--line-soft);
padding:8px 7px;
}

tbody td{
font-size:12.5px;
padding:8px 7px;
border-bottom:1px solid rgba(56,50,52,.09);
}

.ta-center{text-align:center}
.ta-right{text-align:right}

.totals{
width:310px;
margin-left:auto;
margin-top:10px;
background:var(--sand);
border:1px solid rgba(167,181,158,.4);
border-radius:12px;
padding:10px 12px;
}

.totals-row{
display:flex;
justify-content:space-between;
margin:6px 0;
font-size:13px;
}

.totals-grand{
border-top:2px solid var(--olive);
padding-top:10px;
margin-top:8px;
font-size:17px;
font-weight:800;
}

.legal{
margin-top:14px;
font-size:11.3px;
line-height:1.35;
}

.legal h4{
margin:10px 0 5px;
font-size:11.8px;
color:var(--olive);
border-left:4px solid var(--olive);
padding-left:8px;
}

.legal p{
margin:5px 0;
}

.bottom{
display:grid;
grid-template-columns:1fr 144px;
gap:12px;
margin-top:12px;
align-items:end;
}

.qr-box{
text-align:center;
background:var(--sand);
border:1px solid rgba(167,181,158,.45);
border-radius:12px;
padding:8px;
}

#qr{
display:block;
margin:auto;
}

.qr-caption{
font-size:10.5px;
}

@page{
size:letter;
margin:12mm;
}

@media print{
html,body{
width:216mm;
height:auto;
margin:0;
padding:0;
background:#fff;
}

body{
background:#fff;
padding:0;
}

.actions{
display:none;
}

.card{
box-shadow:none;
border-radius:0;
border:0;
width:186mm;
max-width:186mm;
padding:0;
}

.legal{
font-size:10.7px;
line-height:1.28;
}

.bottom{
grid-template-columns:1fr 126px;
}
}
</style>
</head>

<body>

<div class="actions">
  <button class="btn btn-back" onclick="history.back()">Volver</button>
  <button class="btn btn-print" onclick="window.print()">Imprimir vista</button>
  <button id="btnGuardarPdfOficial" class="btn btn-secondary">Guardar PDF oficial</button>
  <button id="btn-view-pdf" class="btn btn-secondary" style="display:none">Ver PDF oficial</button>
  <button id="btn-download-pdf" class="btn btn-secondary" style="display:none">Descargar PDF oficial</button>
</div>

<div id="pdf-status" class="pdf-status"></div>
<div id="app"></div>

<script>
function getParams(){
  return new URLSearchParams(window.location.search);
}

function getFolioFromPath(){
  const params = getParams();
  const queryFolio = String(params.get('folio') || '').trim();
  if(queryFolio) return queryFolio;

  const parts = window.location.pathname.split('/').filter(Boolean);
  if(parts[0] === 'ticket' && parts[1]) return decodeURIComponent(parts[1]).trim();
  return '';
}

function isAutoExportMode(){
  return getParams().get('exportPdf') === '1';
}

function money(v){
  const n = Number(v || 0);
  return '$' + n.toLocaleString('es-MX',{minimumFractionDigits:2});
}

function esc(v){
  return String(v ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;');
}

function setPdfStatus(message, isError = false){
  const statusEl = document.getElementById('pdf-status');
  if(!statusEl) return;
  statusEl.textContent = message || '';
  statusEl.style.color = isError ? '#b42318' : '#5b5457';
}

function blobToBase64(blob){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => {
      const result = String(reader.result || '');
      const base64 = result.split(',')[1] || '';
      resolve(base64);
    };
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

async function exportTicketPdfBlob(){
  const ticket = document.getElementById('ticket-pdf-source');
  if(!ticket) throw new Error('No se encontró el contenedor del ticket.');
  if(!window.html2canvas) throw new Error('No se cargó html2canvas.');
  if(!window.jspdf?.jsPDF) throw new Error('No se cargó jsPDF.');

  const originalScrollY = window.scrollY;
  window.scrollTo(0, 0);

  const canvas = await window.html2canvas(ticket, {
    scale: 2,
    useCORS: true,
    backgroundColor: '#ffffff',
    logging: false,
    windowWidth: document.documentElement.scrollWidth,
    windowHeight: document.documentElement.scrollHeight
  });

  window.scrollTo(0, originalScrollY);

  const imgData = canvas.toDataURL('image/jpeg', 0.95);
  const { jsPDF } = window.jspdf;

  const pdf = new jsPDF({
    orientation: 'portrait',
    unit: 'pt',
    format: 'letter',
    compress: true
  });

  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();

  const margin = 20;
  const maxWidth = pageWidth - margin * 2;
  const maxHeight = pageHeight - margin * 2;

  const ratio = Math.min(maxWidth / canvas.width, maxHeight / canvas.height);
  const renderWidth = canvas.width * ratio;
  const renderHeight = canvas.height * ratio;
  const x = (pageWidth - renderWidth) / 2;
  const y = margin;

  pdf.addImage(imgData, 'JPEG', x, y, renderWidth, renderHeight, undefined, 'FAST');
  return pdf.output('blob');
}

async function guardarPdfTicketViaProxy({ folio, pdfBlob }){
  const pdfBase64 = await blobToBase64(pdfBlob);

  const response = await fetch('/api/core?action=apartados&op=pdf-webapp-proxy', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      action: 'guardar_pdf_ticket_web',
      folio,
      fileName: `${folio}.pdf`,
      mimeType: 'application/pdf',
      pdfBase64
    })
  });

  const data = await response.json().catch(() => ({}));
  if(!response.ok || !data?.ok){
    throw new Error(data?.details || data?.message || data?.error || 'No se pudo guardar el PDF en Drive.');
  }

  return data;
}

function notifyParentPdfSaved(payload){
  try{
    if(window.opener && !window.opener.closed){
      window.opener.postMessage({
        source: 'haruja-ticket',
        type: 'pdf-saved',
        ...payload
      }, window.location.origin);
    }
  }catch(_){}
}

async function guardarPdfOficialDesdeVistaWeb(){
  const btn = document.getElementById('btnGuardarPdfOficial');
  const viewBtn = document.getElementById('btn-view-pdf');
  const downloadBtn = document.getElementById('btn-download-pdf');
  const folio = getFolioFromPath();
  const autoMode = isAutoExportMode();

  if(!folio){
    setPdfStatus('No se pudo detectar el folio.', true);
    return;
  }

  const previousText = btn?.textContent || 'Guardar PDF oficial';

  try{
    if(btn){
      btn.disabled = true;
      btn.textContent = 'Generando PDF...';
    }

    setPdfStatus('Generando PDF oficial...');
    console.log('pdf:ticket_start', { folio, autoMode });

    const pdfBlob = await exportTicketPdfBlob();

    if(btn) btn.textContent = 'Guardando en Drive...';
    setPdfStatus('Guardando PDF en Drive...');

    const result = await guardarPdfTicketViaProxy({ folio, pdfBlob });

    console.log('pdf:ticket_ok', result);
    setPdfStatus(`PDF oficial guardado correctamente${result?.updatedAt ? ` · Actualizado: ${result.updatedAt}` : ''}`);

    if(result?.pdfUrl){
      viewBtn.style.display = 'inline-block';
      downloadBtn.style.display = 'inline-block';
      viewBtn.onclick = () => window.open(result.pdfUrl, '_blank', 'noopener');
      downloadBtn.onclick = () => window.open(result.pdfUrl, '_blank', 'noopener');
    }

    notifyParentPdfSaved({
      folio,
      pdfUrl: result?.pdfUrl || '',
      fileId: result?.fileId || '',
      updatedAt: result?.updatedAt || new Date().toISOString()
    });

    if(autoMode){
      setTimeout(() => {
        try { window.close(); } catch(_) {}
      }, 1200);
    }
  }catch(error){
    console.error('pdf:ticket_error', error);
    setPdfStatus(error?.message || 'No se pudo guardar el PDF oficial.', true);
    notifyParentPdfSaved({
      folio,
      error: error?.message || 'No se pudo guardar el PDF oficial.'
    });
  }finally{
    if(btn){
      btn.disabled = false;
      btn.textContent = previousText;
    }
  }
}

async function loadTicket(){
  const folio = getFolioFromPath();

  if(!folio){
    document.getElementById('app').innerHTML = 'Folio inválido';
    return;
  }

  const res = await fetch(`/api/core?action=apartados&op=detail&folio=${encodeURIComponent(folio)}`);
  const payload = await res.json();
  const data = payload?.data || payload;

  renderTicket(data);
  await syncPdfUi(data?.apartado || data);
}

async function syncPdfUi(apartado){
  const statusEl = document.getElementById('pdf-status');
  const viewBtn = document.getElementById('btn-view-pdf');
  const downloadBtn = document.getElementById('btn-download-pdf');
  const folio = String(apartado?.folio || getFolioFromPath() || '').trim();
  if(!statusEl || !viewBtn || !downloadBtn || !folio) return;

  const pdfUrl = String(
    apartado?.pdfDriveUrl ||
    apartado?.pdfUrlPersistido ||
    apartado?.pdfUrl ||
    ''
  ).trim();

  const updatedAt = String(apartado?.pdfUpdatedAt || '').trim();

  if(pdfUrl){
    viewBtn.style.display = 'inline-block';
    downloadBtn.style.display = 'inline-block';
    viewBtn.onclick = () => window.open(pdfUrl, '_blank', 'noopener');
    downloadBtn.onclick = () => window.open(pdfUrl, '_blank', 'noopener');
    statusEl.textContent = `PDF oficial disponible${updatedAt ? ` · Actualizado: ${updatedAt}` : ''}`;
  }else{
    viewBtn.style.display = 'none';
    downloadBtn.style.display = 'none';
    statusEl.textContent = 'Genera el PDF oficial con el botón para descargarlo.';
  }
}

function renderTicket(payload){
  const a = payload.apartado || payload;
  const items = Array.isArray(a.productos) ? a.productos : [];

  const subtotal = Number(a.subtotal || 0);
  const anticipo = Number(a.anticipo || 0);
  const descuento = Number(a.descuento || 0);
  const saldoPendiente = Number(a.saldo || 0) > 0
    ? Number(a.saldo || 0)
    : Math.max(0, subtotal - descuento - anticipo);

  const rows = items.length ? items.map(i => {
    const cantidad = Number(i.cantidad || 1);
    const precio = Number(i.precio || 0);
    const subtotalCalculado = Number(i.subtotal || 0) > 0
      ? Number(i.subtotal || 0)
      : (cantidad * precio);

    return `
<tr>
<td>${esc(i.codigo)}</td>
<td>${esc(i.descripcion)}</td>
<td class="ta-center">${esc(cantidad)}</td>
<td class="ta-right">${money(precio)}</td>
<td class="ta-right">${money(subtotalCalculado)}</td>
</tr>
`;
  }).join('') : `<tr><td colspan="5" class="ta-center">No hay productos</td></tr>`;

  document.getElementById('app').innerHTML = `
<div class="card" id="ticket-pdf-source" data-folio="${esc(a.folio)}">

  <div class="logo-wrap">
    <img class="logo" src="/assets/haruja-logo.png" alt="HarujaGdl">
  </div>

  <hr class="top-line">

  <div class="top-row">
    <div class="title">Ticket de apartado</div>
    <div class="folio">#${esc(a.folio)}</div>
  </div>

  <div class="meta">
    <b>Fecha:</b><div>${esc(a.fecha)}</div>
    <b>Cliente:</b><div>${esc(a.cliente)}</div>
    <b>Contacto:</b><div>${esc(a.telefono || a.contacto)}</div>
  </div>

  <div class="section-title">Detalle</div>

  <table>
    <thead>
      <tr>
        <th>Código</th>
        <th>Descripción</th>
        <th class="ta-center">Cant</th>
        <th class="ta-right">P.U.</th>
        <th class="ta-right">Importe</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>

  <div class="totals">
    <div class="totals-row"><b>Subtotal:</b><span>${money(subtotal)}</span></div>
    <div class="totals-row"><b>Total abonado:</b><span>${money(Number(a.totalAbonado ?? anticipo))}</span></div>
    <div class="totals-row"><b>Descuento:</b><span>${money(descuento)}</span></div>
    <div class="totals-row"><b>Saldo pendiente:</b><span>${money(Number(a.saldoPendiente ?? saldoPendiente))}</span></div>
    ${Number(a.sobrepago||0)>0?`<div class="totals-row"><b>Saldo a favor:</b><span>${money(a.sobrepago)}</span></div>`:""}
    <div class="totals-row totals-grand"><b>TOTAL DEL APARTADO</b><span>${money(Number(a.total||0))}</span></div>
  </div>

  <div class="section-title">Historial de pagos</div>
  <ul>${Array.isArray(a.historialAbonos)&&a.historialAbonos.length?[...a.historialAbonos].sort((x,y)=>Date.parse(String(x?.fecha||""))-Date.parse(String(y?.fecha||""))).map((h)=>`<li>${esc(h.fecha||"Sin fecha")} — ${money(h.monto)} — ${esc(h.tipo||h.comentario||"Abono")}</li>`).join(""):"<li>Sin pagos registrados</li>"}</ul>

  <div class="legal">
    <p><strong>Gracias por tu compra en HarujaGdl</strong></p>
    <p>Todos nuestros productos pasan por inspección para garantizar calidad, talla solicitada y que estén libres de defectos.</p>

    <h4>CAMBIOS</h4>
    <p>Solicítalo dentro de 7 días naturales de recibir tu compra.</p>
    <p>La prenda debe estar nueva, sin uso, sin lavar y con etiquetas originales.</p>
    <p>No aplican cambios en: prendas tejidas, bordadas, con aplicaciones, accesorios, prendas de ropa íntima, trajes de baño, rebajas o compras con cupón.</p>
    <p>Los gastos de envío corren por cuenta del cliente.</p>
    <p>Solicita tu cambio por WhatsApp al 33 3033 6506 indicando motivo, prenda y talla deseada.</p>

    <h4>APARTADOS</h4>
    <p>Puedes apartar con 25% de anticipo.</p>
    <p>Plazo máximo para recoger: 30 días.</p>
    <p>Pasado ese tiempo, la prenda vuelve a venta y el anticipo queda como saldo a favor por 3 meses a partir de la fecha inicial del apartado.</p>
    <p>No aplican cambios ni devoluciones en apartados.</p>
    <p>No realizamos devoluciones de dinero. Todos los cambios son por producto de igual o mayor valor.</p>

    <p><strong>Gracias por elegirnos</strong></p>
  </div>

  <div class="bottom">
    <div class="meta">
      <b>Pedido:</b><div>${esc(a.folio)}</div>
      <b>Fecha:</b><div>${esc(a.fecha)}</div>
      <b>Cliente:</b><div>${esc(a.cliente)}</div>
      <b>Contacto:</b><div>${esc(a.telefono || a.contacto)}</div>
    </div>

    <div class="qr-box">
      <canvas id="qr"></canvas>
      <div class="qr-caption">Escanea para ver tu apartado</div>
    </div>
  </div>

</div>
`;

  const urlStatus = `${window.location.origin}/apartado/${encodeURIComponent(a.folio || '')}`;
  QRCode.toCanvas(document.getElementById('qr'), urlStatus, { width:106, margin:1 });
}

document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('btnGuardarPdfOficial');
  if(btn){
    btn.addEventListener('click', guardarPdfOficialDesdeVistaWeb);
  }
});

window.addEventListener('load', () => {
  if(isAutoExportMode()){
    setTimeout(() => {
      guardarPdfOficialDesdeVistaWeb();
    }, 900);
  }
});

loadTicket();
</script>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

</body>
</html>
