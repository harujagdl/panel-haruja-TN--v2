<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ventas & Comisiones | Haruja</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: #f6f7fb; color: #111827; }
    .wrap { max-width: 1200px; margin: 24px auto; padding: 0 16px; }
    .topbar{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom: 12px; }
    .brandlink img{ height: 36px; width:auto; display:block; }
    .card { background:#fff; border-radius:16px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); padding: 18px; }
    h1 { margin: 0 0 12px; font-size: 34px; }
    .controls { display:flex; gap: 12px; flex-wrap: wrap; align-items: end; }
    .field { display:flex; flex-direction:column; gap: 6px; }
    .field label { font-size: 12px; color:#6b7280; }
    input, select { padding: 10px 12px; border-radius: 10px; border:1px solid #e5e7eb; font-size:14px; background:#fff; }
    button { padding: 10px 14px; border-radius: 12px; border: none; font-weight: 600; cursor:pointer; }
    .btn-primary { background:#2563eb; color:#fff; }
    .btn-secondary { background:#e5e7eb; color:#111827; }
    .status { margin-top: 8px; font-size: 13px; color:#6b7280; min-height: 18px; }
    .stats { display:grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 14px; }
    .stat { background:#f8fafc; border: 1px solid #e5e7eb; border-radius: 14px; padding: 12px; }
    .stat .label { font-size: 12px; color:#6b7280; }
    .stat .value { font-size: 18px; font-weight: 800; margin-top: 2px; }
    table { width:100%; border-collapse: collapse; font-size: 13px; background:#fff; margin-top: 14px; }
    th, td { padding: 10px; border-bottom: 1px solid #e5e7eb; text-align:left; vertical-align: middle; }
    .badge { font-size: 12px; border-radius: 999px; padding: 4px 8px; background: #fff3cd; color: #92400e; border: 1px solid #fde68a; }
    @media (max-width: 900px) { .stats { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="brandlink" href="https://paneltb.harujagdl.com/#/panel">
        <img src="assets/haruja-logo.png" alt="HarujaGdl">
      </a>
    </div>

    <div class="card">
      <h1>Ventas & Comisiones</h1>
      <div class="controls">
        <div class="field">
          <label for="month">Mes</label>
          <input id="month" type="month" />
        </div>
        <button id="btnLoad" class="btn-secondary">Ver detalle</button>
        <button id="btnSync" class="btn-primary">Sincronizar</button>
      </div>
      <div id="status" class="status"></div>
    </div>

    <div class="stats">
      <div class="stat"><div class="label">Total del mes</div><div id="totalMes" class="value">—</div></div>
      <div class="stat"><div class="label">Total por vendedora</div><div id="totalsBySeller" class="value">—</div></div>
      <div class="stat"><div class="label">Sin asignar</div><div id="sinAsignar" class="value">—</div></div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Pedido</th>
          <th>Fecha</th>
          <th>Cliente</th>
          <th>Total</th>
          <th>Vendedora</th>
          <th>Comisión</th>
          <th>Pago</th>
          <th>Entrega</th>
        </tr>
      </thead>
      <tbody id="tbody"><tr><td colspan="8">Cargando...</td></tr></tbody>
    </table>
  </div>

  <script>
    const SELLERS = ["Haru", "Vendedora"];
    const moneyMx = new Intl.NumberFormat("es-MX", { style: "currency", currency: "MXN", maximumFractionDigits: 2 });

    const monthInput = document.getElementById("month");
    const statusEl = document.getElementById("status");
    const tbody = document.getElementById("tbody");
    const totalMesEl = document.getElementById("totalMes");
    const totalsBySellerEl = document.getElementById("totalsBySeller");
    const sinAsignarEl = document.getElementById("sinAsignar");

    const setStatus = (txt = "") => { statusEl.textContent = txt; };
    const safeJson = async (res) => JSON.parse(await res.text() || "{}");
    const fmtDate = (value) => value ? new Date(value).toLocaleDateString("es-MX") : "—";

    const normalizeSeller = (value = "") => {
      const raw = String(value).trim().toLowerCase();
      if (raw === "haru") return "Haru";
      if (raw === "vendedora") return "Vendedora";
      return "";
    };

    const sellerSelectHtml = (selected = "") => {
      const options = ["", ...SELLERS].map((name) => `<option value="${name}" ${name === selected ? "selected" : ""}>${name || "Sin asignar"}</option>`).join("");
      return `<select data-seller>${options}</select>`;
    };

    const loadResumen = async () => {
      const month = monthInput.value;
      const url = new URL("/api/core", location.origin);
      url.searchParams.set("action", "ventas-resumen");
      if (month) url.searchParams.set("month", month);
      const res = await fetch(url.toString());
      const payload = await safeJson(res);
      if (!res.ok || !payload?.ok) throw new Error(payload?.message || "No se pudo cargar resumen");
      const data = payload.data || {};
      totalMesEl.textContent = moneyMx.format(Number(data.total_mes) || 0);
      totalsBySellerEl.textContent = `Haru ${moneyMx.format(Number(data.total_haru) || 0)} · Vendedora ${moneyMx.format(Number(data.total_vendedora) || 0)}`;
      sinAsignarEl.textContent = String(Number(data.sin_asignar) || 0);
    };

    const loadDetalle = async () => {
      setStatus("Cargando ventas...");
      const month = monthInput.value;
      const url = new URL("/api/core", location.origin);
      url.searchParams.set("action", "ventas-detalle");
      if (month) url.searchParams.set("month", month);

      const res = await fetch(url.toString());
      const payload = await safeJson(res);
      if (!res.ok || !payload?.ok) throw new Error(payload?.message || "No se pudo cargar detalle");

      const rows = Array.isArray(payload.data) ? payload.data : [];
      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="8">No hay ventas para este mes.</td></tr>`;
      } else {
        tbody.innerHTML = rows.map((row) => {
          const seller = normalizeSeller(row.seller);
          const noAssigned = !seller || !row.seller_assigned;
          return `
            <tr data-order-id="${row.order_id}">
              <td>${row.order_id}</td>
              <td>${fmtDate(row.created_at)}</td>
              <td>${row.customer_name || "—"}</td>
              <td>${moneyMx.format(Number(row.total) || 0)}</td>
              <td>${sellerSelectHtml(seller)} ${noAssigned ? '<span class="badge">Sin asignar</span>' : ''}</td>
              <td>${moneyMx.format(Number(row.commission_amount) || 0)}</td>
              <td>${row.payment_status || "—"}</td>
              <td>${row.fulfillment_status || "—"}</td>
            </tr>`;
        }).join("");
      }

      await loadResumen();
      setStatus(`Listo. ${rows.length} ventas.`);
    };

    const syncVentas = async () => {
      setStatus("Sincronizando con Tiendanube...");
      const res = await fetch("/api/core?action=ventas-sync", { method: "POST" });
      const payload = await safeJson(res);
      if (!res.ok || !payload?.ok) throw new Error(payload?.message || "No se pudo sincronizar");
      const data = payload.data || {};
      setStatus(`Sync OK: ${data.synced || 0} pedidos (${data.inserted || 0} nuevos / ${data.updated || 0} actualizados).`);
      await loadDetalle();
    };

    const assignSeller = async (orderId, seller) => {
      const res = await fetch("/api/core?action=venta-asignar-vendedora", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ order_id: orderId, seller })
      });
      const payload = await safeJson(res);
      if (!res.ok || !payload?.ok) throw new Error(payload?.message || "No se pudo asignar vendedora");
      await loadDetalle();
    };

    document.getElementById("btnLoad").addEventListener("click", () => loadDetalle().catch((e) => setStatus(e.message || String(e))));
    document.getElementById("btnSync").addEventListener("click", () => syncVentas().catch((e) => setStatus(e.message || String(e))));

    tbody.addEventListener("change", (ev) => {
      if (!(ev.target instanceof HTMLSelectElement) || !ev.target.hasAttribute("data-seller")) return;
      const row = ev.target.closest("tr");
      const orderId = row?.getAttribute("data-order-id") || "";
      const seller = ev.target.value;
      if (!orderId || !seller) return;
      assignSeller(orderId, seller).catch((e) => setStatus(e.message || String(e)));
    });

    monthInput.value = new Date().toISOString().slice(0, 7);
    loadDetalle().catch((e) => setStatus(e.message || String(e)));
  </script>
</body>
</html>
