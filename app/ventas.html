<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ventas & Comisiones | Haruja</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: #f6f7fb; color: #111827; }
    .wrap { max-width: 1100px; margin: 24px auto; padding: 0 16px; }
    .page-header-wrapper { position: relative; }
    .panel-back-btn {
      position: absolute;
      top: 20px;
      right: 24px;
      padding: 8px 16px;
      background: #f3f4f6;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      color: #2563eb;
      text-decoration: none;
      border: 1px solid #e5e7eb;
      transition: all .2s ease;
    }
    .panel-back-btn:hover { background: #e5e7eb; }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom: 12px;
    }
    .brandlink{
      display:flex;
      align-items:center;
      gap:10px;
      text-decoration:none;
      color:#111827;
    }
    .brandlink img{
      height: 36px;
      width:auto;
      display:block;
    }
    .card { background:#fff; border-radius:16px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); padding: 18px; }
    h1 { margin: 0 0 12px; font-size: 34px; }
    .controls { display:flex; gap: 12px; flex-wrap: wrap; align-items: end; }
    .field { display:flex; flex-direction:column; gap: 6px; }
    .field label { font-size: 12px; color:#6b7280; }
    input, select { padding: 10px 12px; border-radius: 10px; border:1px solid #e5e7eb; font-size:14px; background:#fff; }
    input.readonly { background:#f3f4f6; color:#111827; }
    button { padding: 10px 14px; border-radius: 12px; border: none; font-weight: 600; cursor:pointer; }
    .btn-primary { background:#2563eb; color:#fff; }
    .btn-primary:hover { background:#1d4ed8; }
    .btn-secondary { background:#e5e7eb; color:#111827; }
    .btn-secondary:hover { background:#d1d5db; }
    .status { margin-top: 8px; font-size: 13px; color:#6b7280; min-height: 18px; }
    .stats { display:grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 14px; }
    .stat { background:#f8fafc; border: 1px solid #e5e7eb; border-radius: 14px; padding: 12px; }
    .stat .label { font-size: 12px; color:#6b7280; }
    .stat .value { font-size: 18px; font-weight: 800; margin-top: 2px; }
    .tableWrap { margin-top: 14px; }
    table { width:100%; border-collapse: collapse; font-size: 13px; background:#fff; border-radius: 16px; overflow:hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
    th, td { padding: 12px 12px; border-bottom: 1px solid #e5e7eb; text-align:left; vertical-align: middle; }
    th { color:#6b7280; font-weight: 700; font-size: 12px; background:#ffffff; }
    tr:last-child td { border-bottom:none; }
    td select { width: 160px; }
    @media (max-width: 820px) {
      .stats { grid-template-columns: 1fr; }
      td select { width: 140px; }
    }
    @media (max-width: 640px) {
      .panel-back-btn {
        top: 14px;
        right: 16px;
        font-size: 13px;
        padding: 6px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap page-header-wrapper">
    <a href="https://paneltb.harujagdl.com/#/panel" class="panel-back-btn">← Volver al panel</a>
    <div class="topbar">
      <a class="brandlink" href="https://paneltb.harujagdl.com/#/panel">
        <img src="assets/haruja-logo.png" alt="HarujaGdl">
      </a>
    </div>

    <div class="card">
      <h1>Ventas & Comisiones</h1>

      <div class="controls">
        <div class="field">
          <label for="storeId">Store ID Tiendanube</label>
          <input id="storeId" placeholder="Ej. 6432936" />
        </div>

        <div class="field">
          <label for="month">Mes</label>
          <input id="month" type="month" />
        </div>

        <button id="btnLoad" class="btn-primary">Actualizar</button>
        <button id="btnCsv" class="btn-secondary">Export CSV</button>
      </div>

      <div id="status" class="status"></div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="label">Total del mes</div>
        <div id="totalMes" class="value">—</div>
      </div>
      <div class="stat">
        <div class="label">Total por vendedora</div>
        <div id="topSeller" class="value">—</div>
      </div>
      <div class="stat">
        <div class="label">Sin asignar</div>
        <div id="sinAsignar" class="value">—</div>
      </div>
    </div>

    <div class="tableWrap">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Venta #</th>
            <th>Cliente</th>
            <th>Total pagado</th>
            <th>Estado</th>
            <th>Vendedora</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="6">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  
  <script>
    const moneyMx = new Intl.NumberFormat("es-MX", { style: "currency", currency: "MXN", maximumFractionDigits: 2 });

    const storeIdInput = document.getElementById("storeId");
    const monthInput = document.getElementById("month");
    const statusEl = document.getElementById("status");
    const tbody = document.getElementById("tbody");

    const totalMesEl = document.getElementById("totalMes");
    const topSellerEl = document.getElementById("topSeller");
    const sinAsignarEl = document.getElementById("sinAsignar");

    const FIXED_STORE_ID = "6432936";
    const sellers = ["Vendedora", "Haru"];
    let currentOrders = [];

    const setStatus = (txt = "") => { statusEl.textContent = txt; };

    const safeJson = async (res) => {
      const ct = (res.headers.get("content-type") || "").toLowerCase();
      const text = await res.text();
      if (!ct.includes("application/json")) {
        throw new Error(`API no regresó JSON. HTTP ${res.status}. Recibí: ${text.slice(0, 120)}...`);
      }
      try { return JSON.parse(text || "{}"); } catch (_e) {
        throw new Error(`JSON inválido. HTTP ${res.status}.`);
      }
    };

    const formatFecha = (value) => {
      if (!value) return "—";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) {
        if (typeof value === "string" && /^\d{4}-\d{2}-\d{2}$/.test(value.trim())) {
          const d2 = new Date(value.trim() + "T00:00:00");
          if (!Number.isNaN(d2.getTime())) return d2.toLocaleDateString("es-MX");
        }
        return "—";
      }
      return d.toLocaleDateString("es-MX");
    };

    const sellerSelectHtml = (selected = "") => {
      const options = ["", ...sellers]
        .map((name) => `<option value="${name}" ${name === selected ? "selected" : ""}>${name || "Sin asignar"}</option>`)
        .join("");
      return `<select data-seller>${options}</select>`;
    };

    const setStats = (data) => {
      const totalMes = Number(data?.summary?.totalMes) || 0;
      const totalSinAsignar = Number(data?.summary?.totalSinAsignar) || 0;
      const top = Array.isArray(data?.summary?.totalPorVendedora) ? data.summary.totalPorVendedora[0] : null;

      totalMesEl.textContent = moneyMx.format(totalMes);
      sinAsignarEl.textContent = moneyMx.format(totalSinAsignar);
      topSellerEl.textContent = top ? `${top.seller}: ${moneyMx.format(Number(top.total) || 0)}` : "Sin asignaciones";
    };

    const loadData = async () => {
      const storeId = storeIdInput.value.trim();
      const month = monthInput.value;

      if (!storeId) { setStatus("No hay storeId configurado."); return; }

      setStatus("Cargando ventas...");
      tbody.innerHTML = `<tr><td colspan="6">Cargando...</td></tr>`;

      try {
        const url = new URL("/api/ventas-comisiones", location.origin);
        url.searchParams.set("storeId", storeId);
        if (month) url.searchParams.set("month", month);

        const res = await fetch(url.toString(), { method: "GET" });
        const data = await safeJson(res);

        if (!res.ok || !data?.ok) {
          throw new Error(data?.error || `Error al cargar ventas (HTTP ${res.status}).`);
        }

        setStats(data);

        const orders = Array.isArray(data.orders) ? data.orders : [];
        currentOrders = orders;
        if (!orders.length) {
          tbody.innerHTML = `<tr><td colspan="6">No hay ventas pagadas para este mes.</td></tr>`;
          setStatus(`Listo. 0 pedidos.`);
          return;
        }

        tbody.innerHTML = orders.map((row) => `
          <tr data-order-id="${row.orderId}">
            <td>${formatFecha(row.fecha)}</td>
            <td>${row.orderNumber ? `#${row.orderNumber}` : row.orderId}</td>
            <td>${row.cliente || "—"}</td>
            <td>${moneyMx.format(Number(row.totalPagado) || 0)}</td>
            <td>${row.estado || "—"}</td>
            <td>${sellerSelectHtml(row.seller || "")}</td>
          </tr>
        `).join("");

        setStatus(`Listo. ${orders.length} pedidos cargados.`);
      } catch (error) {
        console.error(error);
        setStatus(`Error al cargar ventas: ${error.message || error}`);
        tbody.innerHTML = `<tr><td colspan="6">Error cargando ventas.</td></tr>`;
      }
    };

    const saveSeller = async (orderId, seller) => {
      try {
        const res = await fetch("/api/ventas-comisiones", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ orderId, seller: seller || "" })
        });

        const data = await safeJson(res);
        if (!res.ok || !data?.ok) {
          throw new Error(data?.error || `No se pudo guardar (HTTP ${res.status}).`);
        }
        setStatus(`Guardado: ${orderId} → ${seller || "Sin asignar"}`);
      } catch (e) {
        console.error(e);
        setStatus(`No se pudo guardar vendedora: ${e.message || e}`);
      }
    };

    const exportCsv = () => {
      if (!currentOrders.length) {
        setStatus("No hay datos para exportar CSV.");
        return;
      }
      const month = monthInput.value;
      const headers = ["fecha", "orderId", "orderNumber", "cliente", "totalPagado", "estado", "seller"];
      const rows = currentOrders.map((order) => headers.map((key) => {
        const value = order?.[key] ?? "";
        const escaped = String(value).replaceAll('"', '""');
        return `"${escaped}"`;
      }).join(","));
      const csv = [headers.join(","), ...rows].join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `ventas-comisiones-${month || "mes"}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setStatus("CSV descargado.");
    };

    storeIdInput.value = FIXED_STORE_ID;
    storeIdInput.readOnly = true;
    storeIdInput.classList.add("readonly");
    localStorage.setItem("haruja_tn_store_id", FIXED_STORE_ID);

    const now = new Date();
    monthInput.value = now.toISOString().slice(0, 7);

    document.getElementById("btnLoad").addEventListener("click", loadData);
    document.getElementById("btnCsv").addEventListener("click", exportCsv);

    tbody.addEventListener("change", (ev) => {
      const sel = ev.target;
      if (!(sel instanceof HTMLSelectElement)) return;
      if (!sel.hasAttribute("data-seller")) return;

      const tr = sel.closest("tr");
      const orderId = tr?.getAttribute("data-order-id") || "";
      if (!orderId) return;
      saveSeller(orderId, sel.value);
    });

    loadData();
  </script>

</body>
</html>
