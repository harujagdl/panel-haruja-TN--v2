<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apartado Haruja</title>
  <style>
    :root{--bg:#f7f7f8;--card:#fff;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--ok:#166534;--warn:#92400e}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink)}
    .wrap{max-width:760px;margin:0 auto;padding:16px}
    .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .brand{font-weight:700;letter-spacing:.04em}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
    .muted{color:var(--muted);font-size:13px}.ttl{font-size:18px;font-weight:700;margin-bottom:8px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .row{display:flex;justify-content:space-between;font-size:14px;padding:6px 0;border-bottom:1px dashed #f0f0f1}
    .row:last-child{border-bottom:none}
    .items li{display:flex;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:14px}
    .items li:last-child{border-bottom:none}
    .status{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;background:#ecfdf5;color:var(--ok);display:inline-block}
    .status.warn{background:#fffbeb;color:var(--warn)}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{border:1px solid #111827;background:#111827;color:#fff;border-radius:10px;padding:10px 14px;text-decoration:none;font-size:14px}
    .btn.ghost{background:#fff;color:#111827}
    .btn:disabled{opacity:.45}
    @media (max-width:640px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="head"><div class="brand">HarujaGdl</div><div id="status" class="status">Cargando…</div></section>

    <section class="card">
      <div class="ttl" id="folio">Apartado</div>
      <div class="grid">
        <div><div class="muted">Cliente</div><div id="cliente">-</div></div>
        <div><div class="muted">Teléfono</div><div id="contacto">-</div></div>
        <div><div class="muted">Fecha de creación</div><div id="fecha">-</div></div>
        <div><div class="muted">Fecha límite</div><div id="fechaLimite">-</div></div>
      </div>
    </section>

    <section class="card">
      <div class="ttl">Productos</div>
      <ul id="items" class="items"></ul>
    </section>

    <section class="card">
      <div class="ttl">Resumen</div>
      <div class="row"><span>Subtotal</span><b id="subtotal">$0.00</b></div>
      <div class="row"><span>Anticipo</span><b id="anticipo">$0.00</b></div>
      <div class="row"><span>Descuento</span><b id="descuento">$0.00</b></div>
      <div class="row"><span>Total</span><b id="total">$0.00</b></div>
      <div class="row"><span>Saldo pendiente</span><b id="saldo">$0.00</b></div>
    </section>

    <section class="card">
      <div class="ttl">Historial de abonos</div>
      <ul id="abonos" class="items"></ul>
      <div class="actions" style="margin-top:10px">
        <a id="waBtn" class="btn ghost" href="#" target="_blank" rel="noopener">Contactar por WhatsApp</a>
        <a id="payBtn" class="btn" href="#" target="_blank" rel="noopener" style="display:none">Pagar saldo</a>
      </div>
    </section>
  </main>

<script>
  const $ = (id) => document.getElementById(id);
  const fmt = (n) => new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN'}).format(Number(n||0));

  function getFolio(){
    const parts = window.location.pathname.split('/').filter(Boolean);
    const fromPath = parts[0] === 'apartado' && parts[1] ? decodeURIComponent(parts[1]) : '';
    const fromQuery = new URLSearchParams(window.location.search).get('folio') || '';
    return String(fromPath || fromQuery || '').trim().toUpperCase();
  }

  function setStatus(status){
    const s = String(status || 'ACTIVO').toUpperCase();
    $('status').textContent = s;
    $('status').className = 'status' + ((s === 'VENCIDO') ? ' warn' : '');
  }

  function fillList(id, rows, emptyText, mapper){
    const el=$(id); el.innerHTML='';
    if (!rows || !rows.length){ el.innerHTML = `<li><span class="muted">${emptyText}</span></li>`; return; }
    rows.forEach((row)=>{ const li=document.createElement('li'); li.innerHTML = mapper(row); el.appendChild(li); });
  }

  async function init(){
    const folio = getFolio();
    if (!folio){ $('status').textContent='Folio inválido'; return; }
    try{
      const r = await fetch(`/api/apartados/get?folio=${encodeURIComponent(folio)}`);
      const data = await r.json();
      if (!r.ok || !data.ok) throw new Error(data.message || 'No se pudo cargar el apartado.');
      const a = data.item || {};
      $('folio').textContent = `Folio ${a.folio || folio}`;
      $('cliente').textContent = a.cliente || '-';
      $('contacto').textContent = a.contacto || '-';
      $('fecha').textContent = a.fecha || '-';
      $('fechaLimite').textContent = a.fechaLimite || '-';
      $('subtotal').textContent = fmt(a.subtotal);
      $('anticipo').textContent = fmt(a.anticipo);
      $('descuento').textContent = fmt(a.descuento);
      $('total').textContent = fmt(a.total);
      $('saldo').textContent = fmt(a.saldoPendiente);
      setStatus(a.status);

      fillList('items', a.items, 'Sin productos.', (it) => `<span>${it.codigo || '-'} · ${it.descripcion || 'Prenda'}</span><b>${fmt(it.precio)}</b>`);
      fillList('abonos', a.abonos, 'Aún no hay abonos registrados.', (ab) => `<span>${ab.fecha || '-'} · ${ab.metodo || 'EFECTIVO'}</span><b>${fmt(ab.monto)}</b>`);

      const phone = String(a.contacto || '').replace(/\D/g,'');
      $('waBtn').href = `https://wa.me/52${phone}?text=${encodeURIComponent(`Hola, quiero información de mi apartado ${a.folio || folio}`)}`;
      if (a.paymentUrl){
        $('payBtn').style.display='inline-block';
        $('payBtn').href = a.paymentUrl;
      }
    }catch(err){
      $('status').textContent = 'No disponible';
      $('folio').textContent = err.message || 'No se pudo cargar el apartado';
    }
  }
  init();
</script>
</body>
</html>
