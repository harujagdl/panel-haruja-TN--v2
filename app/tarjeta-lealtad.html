<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarjeta de Lealtad Haruja</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #faf6f1;
      color: #383234;
      min-height: 100vh;
      margin: 0;
    }

    .page {
      max-width: 420px;
      width: 92%;
      margin: 24px auto;
    }

    .page-header-wrapper {
      position: relative;
    }

    .panel-back-btn {
      position: absolute;
      top: 20px;
      right: 24px;
      padding: 8px 16px;
      background: #f3f4f6;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      color: #2563eb;
      text-decoration: none;
      border: 1px solid #e5e7eb;
      transition: all .2s ease;
    }

    .panel-back-btn:hover {
      background: #e5e7eb;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 16px 0 12px;
    }

    .brandlink {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .brandlink img {
      height: 36px;
      width: auto;
      display: block;
    }

    .card {
      background: #fff;
      border: 1px solid #e7ddd3;
      border-radius: 14px;
      padding: 20px;
      max-width: 420px;
      width: 100%;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    .pill {
      background: #d6c4b3;
      padding: 4px 10px;
      border-radius: 999px;
      display: inline-block;
    }

    .muted {
      color: #6b7280;
    }

    .section-title {
      margin-top: 16px;
      margin-bottom: 8px;
      font-size: 15px;
      font-weight: 700;
    }

    ul {
      padding-left: 18px;
      margin-top: 8px;
      margin-bottom: 0;
    }

    .empty {
      color: #6b7280;
      font-size: 14px;
    }

    @media (max-width: 640px) {
      .panel-back-btn {
        top: 14px;
        right: 16px;
        font-size: 13px;
        padding: 6px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="page page-header-wrapper">
    <a href="https://paneltn.harujagdl.com/#/panel" class="panel-back-btn">← Volver al panel</a>

    <div class="topbar">
      <a class="brandlink" href="https://paneltn.harujagdl.com/#/panel">
        <img
          src="/assets/haruja-logo.png"
          alt="HarujaGdl"
          onerror="this.onerror=null;this.src='/app/assets/haruja-logo.png';"
        />
      </a>
    </div>

    <div class="card">
      <h1>Tarjeta de Lealtad</h1>
      <div id="content">Cargando...</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      serverTimestamp,
      doc,
      getDoc,
      getDocs,
      setDoc,
      updateDoc,
      query,
      where,
      orderBy,
      limit
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB6vH_TI5Wh-hYHXE64coVobuI3vzn9D1Q",
      authDomain: "haruja-loyalty.firebaseapp.com",
      projectId: "haruja-loyalty",
      storageBucket: "haruja-loyalty.firebasestorage.app",
      messagingSenderId: "229949615835",
      appId: "1:229949615835:web:dfcd3e81e52c916a2aa6fe",
      measurementId: "G-LKVRFX04CL"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.loyaltyFirebase = {
      app,
      db,
      collection,
      addDoc,
      serverTimestamp,
      doc,
      getDoc,
      getDocs,
      setDoc,
      updateDoc,
      query,
      where,
      orderBy,
      limit
    };

    console.log("[tarjeta-lealtad] Firebase conectado:", firebaseConfig.projectId);
  </script>

  <script src="/shared/loyaltyService.js"></script>

  <script>
    const token = new URLSearchParams(location.search).get("token");
    const content = document.getElementById("content");

    const rewardLine = (r) => {
      const label = r?.label || "Recompensa";
      if (r?.available) {
        return `<li>${label} ✅</li>`;
      }
      return `<li>${label} ${(typeof r?.missingPoints === "number") ? `(faltan ${r.missingPoints} pts)` : ""}</li>`;
    };

    const renderEmptyRewards = () => {
      return `<div class="empty">Aún no hay recompensas configuradas para este cliente.</div>`;
    };

    const run = async () => {
      if (!token) {
        content.textContent = "Falta token.";
        return;
      }

      if (!window.loyaltyService) {
        content.textContent = "Firebase de loyalty no está inicializado.";
        return;
      }

      try {
        const data = await window.loyaltyService.getCustomer({ token });
        window.loyaltyService.addVisit(token).catch(() => null);

        const c = data.clientPublic || data.client || data.customer || null;

        if (!c) {
          content.textContent = "Cliente no encontrado.";
          return;
        }

        const rewardsHtml = Array.isArray(c.rewardOptions) && c.rewardOptions.length
          ? `<ul>${c.rewardOptions.map(rewardLine).join("")}</ul>`
          : renderEmptyRewards();

        content.innerHTML = `
          <p><b>${c.name || "Cliente"}</b></p>
          <p class="muted">ID: ${c.clientId || "-"}</p>
          <p>Nivel: <span class="pill">${c.level || "Bronce"}</span></p>
          <p>Puntos: <b>${Number(c.points || 0)}</b></p>
          <p>Compras acumuladas: <b>$${Number(c.totalPurchases || 0).toFixed(2)}</b></p>

          <div class="section-title">Recompensas</div>
          ${rewardsHtml}
        `;
      } catch (e) {
        console.error(e);
        content.textContent = e?.message || "No se pudo cargar la tarjeta.";
      }
    };

    run();
  </script>
</body>
</html>
